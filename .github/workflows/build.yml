name: Kompilacja wtyczki Argon dla AX3600

on:
  workflow_dispatch: # Pozwala na ręczne uruchomienie zielonym przyciskiem

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Klonowanie repozytorium
      uses: actions/checkout@v4

    - name: Instalacja niezbędnych narzędzi w chmurze
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-setuptools rsync swig unzip zlib1g-dev file wget

    - name: Dynamiczne pobieranie najnowszego OpenWrt SDK
      run: |
        # Pobieramy listę plików dla architektury Xiaomi AX3600 (ipq807x) i szukamy pliku SDK
        SDK_NAME=$(wget -qO- https://downloads.openwrt.org/snapshots/targets/ipq807x/generic/ | grep -oE 'openwrt-sdk-[^"]+\.tar\.xz' | head -n 1)
        echo "Znaleziono SDK: $SDK_NAME"
        wget "https://downloads.openwrt.org/snapshots/targets/ipq807x/generic/$SDK_NAME"
        tar -xf openwrt-sdk-*.tar.xz
        mv openwrt-sdk-* openwrt-sdk

    - name: Aktualizacja Feeds i pobieranie wtyczki Argon
      run: |
        cd openwrt-sdk
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        cd package
        # Pobieramy kod źródłowy wtyczki konfiguracyjnej Argona
        git clone https://github.com/jerrykuku/luci-app-argon-config.git
        cd ..
        ./scripts/feeds update -i
        ./scripts/feeds install luci-app-argon-config

    - name: Właściwa kompilacja paczki
      run: |
        cd openwrt-sdk
        make defconfig
        # Kompilujemy wyłącznie wybraną wtyczkę (V=s pokaże nam błędy, jeśli wystąpią)
        make package/luci-app-argon-config/compile V=s

    - name: Udostępnienie gotowego pliku .apk do pobrania
      uses: actions/upload-artifact@v4
      with:
        name: Gotowa_Paczka_Argon_APK
        path: openwrt-sdk/bin/**/*argon-config*
