name: Kompilacja wtyczki Argon dla AX3600 (Wydanie 25.12.4)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Klonowanie repozytorium
      uses: actions/checkout@v4

    - name: Instalacja niezbędnych narzędzi w chmurze
      run: |
        sudo apt-get update
        # Dodano pakiet 'zstd' wymagany do nowej kompresji archiwów OpenWrt
        sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-setuptools rsync swig unzip zlib1g-dev file wget zstd

    - name: Pobieranie OpenWrt SDK (25.12.4 Qualcommax)
      run: |
        SDK_URL="https://downloads.openwrt.org/releases/25.12.4/targets/qualcommax/ipq807x/"
        # Szukamy paczki .tar.xz LUB .tar.zst (nowy standard)
        SDK_NAME=$(wget -qO- $SDK_URL | grep -oE 'openwrt-sdk-[^"]+\.tar\.(xz|zst)' | head -n 1)
        echo "Znaleziono i pobieram SDK: $SDK_NAME"
        wget "$SDK_URL$SDK_NAME"
        # Rozpakowujemy niezależnie od końcówki
        tar -xf openwrt-sdk-*.tar.*
        mv openwrt-sdk-* openwrt-sdk

    - name: Aktualizacja Feeds i pobieranie wtyczki Argon
      run: |
        cd openwrt-sdk
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        cd package
        git clone https://github.com/jerrykuku/luci-app-argon-config.git
        cd ..

    - name: Instalacja brakujących zależności LuCI
      run: |
        cd openwrt-sdk
        ./scripts/feeds install luci-base luci-compat

    - name: Właściwa kompilacja paczki
      run: |
        cd openwrt-sdk
        make defconfig
        make package/luci-app-argon-config/compile V=s

    - name: Udostępnienie gotowego pliku do pobrania
      uses: actions/upload-artifact@v4
      with:
        name: Gotowa_Paczka_Argon_Config
        path: openwrt-sdk/bin/**/*argon-config*
